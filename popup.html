<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cereal:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #222;
      padding: 24px 24px 16px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #222;
      margin-bottom: 12px;
    }

    .preview {
      display: none;
      font-size: 13px;
      color: #717171;
      margin-bottom: 16px;
    }

    .btn-cancel {
      background: none;
      border: none;
      color: #717171;
      font-size: 13px;
      font-weight: 400;
      padding: 8px 0;
      display: none;
      justify-content: center;
      cursor: pointer;
    }

    .btn-cancel:hover {
      color: #c13515;
      box-shadow: none;
      border-color: transparent;
    }

    .btn-cancel.visible {
      display: flex;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fff;
      color: #222;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    button:hover:not(:disabled) {
      border-color: #222;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    button:active:not(:disabled) {
      transform: scale(0.99);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .btn-icon svg {
      width: 20px;
      height: 20px;
    }

    .btn-label {
      flex: 1;
      text-align: left;
    }

    .btn-arrow {
      color: #b0b0b0;
      font-size: 16px;
      transition: color 0.2s;
    }

    button:hover:not(:disabled) .btn-arrow {
      color: #222;
    }

    .figma-settings {
      display: none;
      margin-top: 12px;
      padding: 20px;
      background: #fafafa;
      border-radius: 12px;
      border: 1px solid #eee;
    }

    .figma-settings.visible {
      display: block;
    }

    .figma-settings label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #222;
      margin-bottom: 4px;
    }

    .figma-settings input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      color: #222;
      font-family: "Inter", -apple-system, sans-serif;
      font-size: 13px;
      margin-bottom: 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .figma-settings input:focus {
      border-color: #222;
      box-shadow: 0 0 0 1px #222;
    }

    .figma-settings input::placeholder {
      color: #b0b0b0;
    }

    .figma-help {
      font-size: 12px;
      color: #717171;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .figma-help a {
      color: #222;
      text-decoration: underline;
      text-underline-offset: 2px;
      text-decoration-color: #ccc;
    }

    .figma-help a:hover {
      text-decoration-color: #222;
    }

    .btn-figma-go {
      background: #222;
      color: #fff;
      border-color: #222;
    }

    .btn-figma-go:hover:not(:disabled) {
      background: #000;
      border-color: #000;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .btn-figma-go .btn-arrow {
      color: rgba(255,255,255,0.5);
    }

    .btn-figma-go:hover:not(:disabled) .btn-arrow {
      color: #fff;
    }

    #status {
      font-size: 13px;
      font-weight: 400;
      color: #717171;
      text-align: center;
    }

    #status:not(:empty) {
      margin-top: 12px;
    }

    #status.error {
      color: #c13515;
    }

    #status.success {
      color: #008a05;
    }

    .progress-bar {
      display: none;
      margin-top: 12px;
      height: 3px;
      background: #eee;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar.visible {
      display: block;
    }

    .progress-fill {
      height: 100%;
      background: #222;
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }
  </style>
</head>
<body>
  <h1>Splicer</h1>

  <div id="preview" class="preview"></div>

  <div class="actions">
    <button id="saveDesktop">
      <span class="btn-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 9C2 7.89543 2.89543 7 4 7H8.17157C8.70201 7 9.21071 7.21071 9.58579 7.58579L10.4142 8.41421C10.7893 8.78929 11.298 9 11.8284 9H20C21.1046 9 22 9.89543 22 11V18C22 19.1046 21.1046 20 20 20H4C2.89543 20 2 19.1046 2 18V9Z" stroke="#222" stroke-width="1.5"/>
          <path d="M4 7V6C4 4.89543 4.89543 4 6 4H9.17157C9.70201 4 10.2107 4.21071 10.5858 4.58579L11.4142 5.41421C11.7893 5.78929 12.298 6 12.8284 6H18C19.1046 6 20 6.89543 20 8V9" stroke="#222" stroke-width="1.5"/>
        </svg>
      </span>
      <span class="btn-label">Save to Downloads</span>
      <span class="btn-arrow">&rsaquo;</span>
    </button>

    <button id="sendFigma">
      <span class="btn-icon">
        <svg viewBox="0 0 38 57" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 28.5C19 23.2533 23.2533 19 28.5 19C33.7467 19 38 23.2533 38 28.5C38 33.7467 33.7467 38 28.5 38C23.2533 38 19 33.7467 19 28.5Z" fill="#1ABCFE"/>
          <path d="M0 47.5C0 42.2533 4.25329 38 9.5 38H19V47.5C19 52.7467 14.7467 57 9.5 57C4.25329 57 0 52.7467 0 47.5Z" fill="#0ACF83"/>
          <path d="M19 0V19H28.5C33.7467 19 38 14.7467 38 9.5C38 4.25329 33.7467 0 28.5 0H19Z" fill="#FF7262"/>
          <path d="M0 9.5C0 14.7467 4.25329 19 9.5 19H19V0H9.5C4.25329 0 0 4.25329 0 9.5Z" fill="#F24E1E"/>
          <path d="M0 28.5C0 33.7467 4.25329 38 9.5 38H19V19H9.5C4.25329 19 0 23.2533 0 28.5Z" fill="#A259FF"/>
        </svg>
      </span>
      <span class="btn-label">Send to Figma</span>
      <span class="btn-arrow">&rsaquo;</span>
    </button>
  </div>

  <div id="figmaSettings" class="figma-settings">
    <label for="figmaToken">Access token</label>
    <p class="figma-help">
      Generate at <a href="https://www.figma.com/developers/api#access-tokens" target="_blank">Figma Settings</a>
    </p>
    <input type="password" id="figmaToken" placeholder="figd_xxxxxxxx">

    <label for="figmaFileKey">File key</label>
    <p class="figma-help">
      From your Figma URL: figma.com/design/<strong>FILE_KEY</strong>/...
    </p>
    <input type="text" id="figmaFileKey" placeholder="abc123XYZ">

    <button id="figmaGo" class="btn-figma-go">
      <span class="btn-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="btn-label">Capture &amp; send</span>
      <span class="btn-arrow">&rsaquo;</span>
    </button>
  </div>

  <div id="progressBar" class="progress-bar">
    <div id="progressFill" class="progress-fill"></div>
  </div>
  <div id="status"></div>
  <button id="cancelBtn" class="btn-cancel">Cancel</button>

  <script src="popup.js"></script>
</body>
</html>
